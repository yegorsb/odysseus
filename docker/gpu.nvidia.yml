# NVIDIA GPU overlay. Enable by setting COMPOSE_FILE in .env:
#   COMPOSE_FILE=docker-compose.yml:docker/gpu.nvidia.yml
#
# Requires the NVIDIA Container Toolkit on the host.
#   Arch:    sudo pacman -S nvidia-container-toolkit
#   Debian:  sudo apt install nvidia-container-toolkit
#   Fedora:  sudo dnf install nvidia-container-toolkit
# Then:
#   sudo nvidia-ctk runtime configure --runtime=docker
#   sudo systemctl restart docker
# Verify with:
#   docker info | grep -i nvidia
#
# Architecture: vLLM runs as its own "vllm" service (GPU-enabled).
# Odysseus app service has no GPU dependency — "docker restart
# odysseus-odysseus-1" no longer kills vLLM.
# The vllm service exposes OpenAI-compatible API at localhost:8000.
services:
  odysseus:
    environment:
      # Keep /app/.local/bin in PATH so Cookbook CLI tools (pip install
      # --user installs) are findable, even though vLLM itself moved out.
      - PATH=/app/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

  vllm:
    build: .
    init: true
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # vLLM binary + CUDA wheels installed by Cookbook (persisted across rebuilds).
      - ./data/local:/app/.local
      # Shared model store — read-only; all 349 GB of models already on disk.
      - /srv/ai-stack/models/llms/huggingface/hub:/app/models/hub:ro
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - HF_HUB_CACHE=/app/models/hub
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PATH=/app/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    command:
      - vllm
      - serve
      - huihui-ai/Huihui-Qwen3-Coder-30B-A3B-Instruct-abliterated
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "8192"
      - --gpu-memory-utilization
      - "0.90"
      - --dtype
      - auto
      - --max-num-seqs
      - "8"
      - --moe-backend
      - triton
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
